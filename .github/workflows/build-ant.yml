name: Build VCam APK via Apache Ant

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Thiết lập môi trường Java chuẩn để biên dịch
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🚀 FIX CHÍ MẠNG: Cài đặt công cụ Apache Ant vào máy ảo Ubuntu
    - name: Install Apache Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    # Ép máy ảo nhận diện đường dẫn Android SDK
    - name: Set Android Home
      run: echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

    # Đúc file APK bằng lệnh Ant thủ công rành mạch
    - name: Compile and Build Release APK with Ant
      run: |
        ant release
        echo "🟢 Biên dịch thủ công bằng Ant thành công!"

    - name: Collect Finished APK
      run: |
        mkdir -p Output
        # Ant sẽ xuất file APK vào thư mục bin/
        cp bin/*-release-unsigned.apk Output/Omni_VCam_Ant.apk
        ls -l bin/

    - name: Upload Finished APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Omni-VCam-Ant-APK
        path: Output/Omni_VCam_Ant.apk
